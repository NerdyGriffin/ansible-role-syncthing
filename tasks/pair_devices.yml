---
# Two-pass device pairing across all hosts in the play

# Pass 1: Collect this host's device ID
- name: Get local Syncthing device ID
  ansible.builtin.command:
    cmd: syncthing cli show system
  become: true
  become_user: "{{ syncthing_user }}"
  environment:
    HOME: "/home/{{ syncthing_user }}"
  register: syncthing_system_info
  changed_when: false

- name: Parse device ID from system info
  ansible.builtin.set_fact:
    syncthing_device_id: "{{ (syncthing_system_info.stdout | from_json).myID }}"

# Pass 2: Register all peer devices
- name: Get existing device IDs
  ansible.builtin.command:
    cmd: syncthing cli config devices list
  become: true
  become_user: "{{ syncthing_user }}"
  environment:
    HOME: "/home/{{ syncthing_user }}"
  register: syncthing_existing_devices
  changed_when: false

- name: Add peer devices
  ansible.builtin.command:
    cmd: >
      syncthing cli config devices add
      --device-id {{ hostvars[item].syncthing_device_id }}
      --name {{ item }}
  become: true
  become_user: "{{ syncthing_user }}"
  environment:
    HOME: "/home/{{ syncthing_user }}"
  loop: "{{ ansible_play_hosts_all | difference([inventory_hostname]) }}"
  when:
    - hostvars[item].syncthing_device_id is defined
    - hostvars[item].syncthing_device_id not in syncthing_existing_devices.stdout
  changed_when: true

- name: Get existing folder device associations
  ansible.builtin.command:
    cmd: syncthing cli config folders {{ item.id }} devices list
  become: true
  become_user: "{{ syncthing_user }}"
  environment:
    HOME: "/home/{{ syncthing_user }}"
  loop: "{{ syncthing_folders }}"
  register: syncthing_folder_devices
  changed_when: false

- name: Build folder device map
  ansible.builtin.set_fact:
    syncthing_folder_device_map: >-
      {{ syncthing_folder_device_map | default({})
         | combine({item.item.id: item.stdout}) }}
  loop: "{{ syncthing_folder_devices.results }}"
  loop_control:
    label: "{{ item.item.id }}"

- name: Share folders with peer devices
  ansible.builtin.command:
    cmd: >
      syncthing cli config folders {{ item.0.id }} devices add
      --device-id {{ hostvars[item.1].syncthing_device_id }}
  become: true
  become_user: "{{ syncthing_user }}"
  environment:
    HOME: "/home/{{ syncthing_user }}"
  loop: "{{ syncthing_folders | product(ansible_play_hosts_all | difference([inventory_hostname])) | list }}"
  when:
    - hostvars[item.1].syncthing_device_id is defined
    - hostvars[item.1].syncthing_device_id not in (syncthing_folder_device_map[item.0.id] | default(''))
  changed_when: true
  notify: Restart syncthing
