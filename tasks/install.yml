---
# Install Syncthing from official upstream repo

- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  when:
    - syncthing_install_repo
    - ansible_facts['os_family'] == 'Debian'

- name: Download Syncthing apt signing key
  ansible.builtin.get_url:
    url: https://syncthing.net/release-key.gpg
    dest: /etc/apt/keyrings/syncthing.gpg
    mode: "0644"
    force: false
  when:
    - syncthing_install_repo
    - ansible_facts['os_family'] == 'Debian'

- name: Add Syncthing apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/syncthing.gpg] https://apt.syncthing.net/ syncthing stable"
    state: present
    filename: syncthing
  when:
    - syncthing_install_repo
    - ansible_facts['os_family'] == 'Debian'

- name: Add Syncthing dnf repository
  ansible.builtin.yum_repository:
    name: syncthing
    description: Syncthing stable
    baseurl: https://yum.syncthing.net/rpm/stable/$basearch
    gpgcheck: true
    gpgkey: https://syncthing.net/release-key.gpg
    enabled: true
  when:
    - syncthing_install_repo
    - ansible_facts['os_family'] == 'RedHat'

- name: Install syncthing package
  ansible.builtin.package:
    name: syncthing
    state: present

- name: Enable and start syncthing service for user
  ansible.builtin.systemd:
    name: "syncthing@{{ syncthing_user }}"
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for Syncthing to generate initial config
  ansible.builtin.wait_for:
    path: "/home/{{ syncthing_user }}/.local/state/syncthing/config.xml"
    timeout: 30
  become: true
  become_user: "{{ syncthing_user }}"
